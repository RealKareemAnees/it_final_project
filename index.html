<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Gallery Landing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
  </head>
  <body>
    <style>
      body.auth-page {
        background-color: var(--color-bg-page);
        color: var(--color-text-dark);
        min-height: 100vh;
      }
      .auth-shell {
        width: min(var(--size-container), calc(100% - 48px));
        gap: var(--spacing-5xl);
        grid-template-columns: minmax(0, 1fr) minmax(0, 420px);
        align-items: center;
        margin: 0 auto;
        padding: clamp(80px, 10vw, 120px) 0;
        display: grid;
      }
      .auth-intro {
        gap: var(--spacing-lg);
        flex-direction: column;
        display: flex;
      }
      .auth-eyebrow {
        font-size: var(--font-size-xs);
        text-transform: uppercase;
        letter-spacing: var(--letter-spacing-2xl);
        color: #00000080;
      }
      .auth-intro h1 {
        letter-spacing: var(--letter-spacing-tight);
        font-size: clamp(2rem, 4vw, 3rem);
      }
      .auth-intro p {
        color: var(--color-text-muted);
        line-height: var(--line-height-relaxed);
      }
      .auth-highlights {
        gap: var(--spacing-md);
        flex-wrap: wrap;
        display: flex;
      }
      .auth-highlight {
        border-radius: var(--radius-full);
        background: var(--color-surface);
        border: 1px solid var(--color-border-light);
        font-size: var(--font-size-xs);
        text-transform: uppercase;
        letter-spacing: var(--letter-spacing-lg);
        padding: 6px 12px;
      }
      .auth-panel {
        background: var(--color-surface);
        border-radius: var(--radius-lg);
        padding: var(--spacing-3xl);
        border: 1px solid var(--color-border-light);
        box-shadow: 0 28px 60px #0000001f;
      }
      .auth-logo {
        font-size: var(--font-size-3xl);
        font-weight: var(--font-weight-semibold);
        letter-spacing: var(--letter-spacing-tight);
        margin-bottom: var(--spacing-3xl);
        text-transform: uppercase;
        display: inline-block;
      }
      .auth-box {
        width: 100%;
      }
      .auth-tabs {
        margin-bottom: var(--spacing-3xl);
        border-bottom: 1px solid var(--color-border-light);
        display: flex;
        position: relative;
      }
      .auth-tab {
        padding: var(--spacing-md) 0;
        font-size: var(--font-size-lg);
        font-weight: var(--font-weight-medium);
        color: var(--color-text-muted);
        transition: color var(--transition-base);
        background: 0 0;
        flex: 1;
      }
      .auth-tab:hover,
      .auth-tab.active {
        color: var(--color-text-dark);
      }
      .auth-tab.active:after {
        content: "";
        background-color: var(--color-text-dark);
        width: 50%;
        height: 2px;
        transition: transform var(--transition-base);
        position: absolute;
        bottom: -1px;
        left: 0;
      }
      .auth-tabs:has(.auth-tab[data-target="signup"].active)
        .auth-tab.active:after {
        transform: translate(100%);
      }
      .auth-form {
        gap: var(--spacing-xl);
        flex-direction: column;
        display: none;
      }
      .auth-form.active {
        animation: fadeIn var(--transition-base);
        display: flex;
      }
      .auth-error {
        color: #8f2d2d;
        margin-bottom: var(--spacing-lg);
        font-size: var(--font-size-sm);
        border-radius: var(--radius-md);
        background: #fbecec;
        padding: 10px 12px;
      }
      @keyframes fadeIn {
        0% {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .form-group {
        gap: var(--spacing-sm);
        flex-direction: column;
        display: flex;
      }
      .form-group label {
        font-size: var(--font-size-sm);
        font-weight: var(--font-weight-medium);
        color: var(--color-text-muted);
      }
      .form-group input {
        font-family: inherit;
        font-size: var(--font-size-base);
        border: 1px solid var(--color-border-medium);
        border-radius: var(--radius-md);
        color: var(--color-text-dark);
        transition:
          border-color var(--transition-base),
          box-shadow var(--transition-base);
        background-color: #fafafa;
        padding: 12px 16px;
      }
      .form-group input:focus {
        border-color: var(--color-text-dark);
        background-color: var(--color-bg-light);
        outline: none;
        box-shadow: 0 0 0 2px #0000000d;
      }
      .form-options {
        font-size: var(--font-size-xs);
        justify-content: flex-end;
        display: flex;
      }
      .forgot-password {
        color: var(--color-text-muted);
        transition: color var(--transition-base);
      }
      .forgot-password:hover {
        color: var(--color-text-dark);
      }
      .auth-submit {
        background-color: var(--color-text-dark);
        color: var(--color-bg-light);
        font-size: var(--font-size-base);
        font-weight: var(--font-weight-medium);
        border-radius: var(--radius-full);
        margin-top: var(--spacing-md);
        transition:
          transform var(--transition-fast),
          background-color var(--transition-base);
        padding: 14px;
      }
      .auth-submit:hover {
        background-color: #333;
        transform: translateY(-1px);
      }
      .auth-submit:active {
        transform: translateY(0);
      }
      @media (width<=900px) {
        .auth-shell {
          grid-template-columns: 1fr;
          padding: 80px 0;
        }
      }
      @media (width<=480px) {
        .auth-shell {
          width: min(var(--size-container), calc(100% - 32px));
          padding: 64px 0;
        }
        .auth-panel {
          padding: var(--spacing-2xl);
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --font-primary: "Space Grotesk", sans-serif;
        --font-size-xs: 11px;
        --font-size-sm: 13px;
        --font-size-base: 14px;
        --font-size-md: 15px;
        --font-size-lg: 16px;
        --font-size-xl: 18px;
        --font-size-2xl: 22px;
        --font-size-3xl: 24px;
        --font-size-4xl: 32px;
        --font-size-heading-responsive: clamp(1.6rem, 3vw, 2.2rem);
        --font-size-heading-lg: clamp(2rem, 4vw, 3rem);
        --font-size-hero: clamp(2.2rem, 4.2vw, 4rem);
        --font-size-contact-heading: clamp(2.6rem, 5.5vw, 4.2rem);
        --font-weight-regular: 400;
        --font-weight-medium: 500;
        --font-weight-semibold: 600;
        --line-height-tight: 1.1;
        --line-height-normal: 1.6;
        --line-height-relaxed: 1.65;
        --line-height-loose: 1.7;
        --letter-spacing-tight: -1px;
        --letter-spacing-base: 0.4px;
        --letter-spacing-md: 0.5px;
        --letter-spacing-lg: 0.6px;
        --letter-spacing-xl: 1px;
        --letter-spacing-2xl: 2px;
        --letter-spacing-3xl: 2.5px;
        --color-bg-dark: #0f0f0f;
        --color-bg-darker: #111;
        --color-bg-light: #fff;
        --color-bg-page: #f6f6f6;
        --color-surface: #fff;
        --color-surface-muted: #f2f2f2;
        --color-surface-strong: #e9e9e9;
        --color-text-dark: #111;
        --color-text-light: #fff;
        --color-text-muted: #333;
        --color-text-subtle: #fff9;
        --color-accent: #c3a269;
        --color-accent-strong: #a8844d;
        --color-overlay-light: #0003;
        --color-overlay-medium: #00000080;
        --color-overlay-dark: #000000d9;
        --color-border-light: #00000014;
        --color-border-medium: #00000026;
        --color-border-dark: #ffffff1f;
        --color-shadow-sm: #00000014;
        --color-shadow-md: #0000001a;
        --color-shadow-lg: #0000002e;
        --spacing-xs: 4px;
        --spacing-sm: 8px;
        --spacing-md: 12px;
        --spacing-lg: 16px;
        --spacing-xl: 20px;
        --spacing-2xl: 24px;
        --spacing-3xl: 32px;
        --spacing-4xl: 40px;
        --spacing-5xl: 48px;
        --spacing-6xl: 56px;
        --spacing-7xl: 64px;
        --spacing-8xl: 80px;
        --spacing-padding-responsive: clamp(56px, 8vw, 96px);
        --spacing-padding-lg: clamp(64px, 10vw, 100px);
        --spacing-padding-xl: clamp(80px, 12vw, 130px);
        --radius-sm: 6px;
        --radius-md: 12px;
        --radius-lg: 20px;
        --radius-xl: 40px;
        --radius-full: 999px;
        --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-base: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-medium: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slower: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slowest: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-fade: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        --size-container: 1100px;
        --size-container-sm: 800px;
        --size-container-md: 680px;
        --size-button-sm: 40px;
        --size-button-md: 44px;
        --size-button-lg: 50px;
        --z-base: 1;
        --z-overlay: 2;
        --z-header: 50;
        --z-mobile-nav: 55;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: var(--font-primary);
        background-color: var(--color-bg-page);
        min-height: 100vh;
        color: var(--color-text-dark);
        margin: 0;
        padding: 0;
        position: relative;
      }
      html.darktheme {
        --lightningcss-light: ;
        --lightningcss-dark: initial;
        color-scheme: dark;
      }
      html:not(.darktheme) {
        --lightningcss-light: initial;
        --lightningcss-dark: ;
        color-scheme: light;
      }
      body.darktheme {
        background-color: var(--color-bg-dark);
        color: var(--color-text-light);
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-weight: var(--font-weight-medium);
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      button {
        cursor: pointer;
        border: none;
        font-family: inherit;
      }
      .mockup-frame {
        z-index: var(--z-base);
        background: 0 0;
        width: 100%;
        min-height: 100vh;
        position: relative;
      }
      .container {
        width: min(var(--size-container), calc(100% - 48px));
        margin: 0 auto;
      }
      .container-md {
        width: min(var(--size-container-md), calc(100% - 48px));
        margin: 0 auto;
      }
      .section-spacing {
        padding: var(--spacing-padding-responsive) 0;
      }
      @keyframes wave {
        0%,
        to {
          transform: translate(0);
        }
        50% {
          transform: translate(4px);
        }
      }
      .header {
        z-index: 50;
        width: 100%;
        color: var(--color-text-light);
        transition:
          background-color var(--transition-medium),
          color var(--transition-medium),
          box-shadow var(--transition-medium),
          border-bottom var(--transition-medium);
        background: 0 0;
        justify-content: space-between;
        align-items: center;
        padding: clamp(18px, 3vw, 30px) clamp(20px, 4vw, 50px);
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
      }
      .header.is-scrolled,
      .header.is-inner {
        color: var(--color-text-dark);
        -webkit-backdrop-filter: blur(10px);
        background-color: #ffffffeb;
        border-bottom: 1px solid #00000014;
        box-shadow: 0 10px 28px #00000014;
      }
      .logo {
        font-size: var(--font-size-3xl);
        font-weight: var(--font-weight-medium);
        color: inherit;
      }
      .desktop-nav {
        gap: clamp(18px, 3vw, 40px);
        display: flex;
      }
      .desktop-nav a {
        color: inherit;
        font-size: var(--font-size-base);
        font-weight: var(--font-weight-regular);
        transition: opacity var(--transition-base);
        text-decoration: none;
      }
      .desktop-nav a:hover {
        opacity: 0.7;
      }
      .header-right {
        align-items: center;
        gap: var(--spacing-lg);
        flex-shrink: 0;
        min-width: 0;
        display: flex;
      }
      .nav-actions {
        align-items: center;
        gap: var(--spacing-md);
        display: flex;
      }
      .nav-link {
        font-size: var(--font-size-base);
        font-weight: var(--font-weight-regular);
        color: inherit;
        transition: opacity var(--transition-base);
        background: 0 0;
        padding: 6px 10px;
        text-decoration: none;
      }
      .nav-link:hover {
        opacity: 0.7;
      }
      .nav-button {
        cursor: pointer;
        border: none;
      }
      .chat-btn {
        background-color: var(--color-bg-light);
        color: var(--color-text-dark);
        border-radius: var(--radius-xl);
        font-size: var(--font-size-base);
        font-weight: var(--font-weight-medium);
        align-items: center;
        gap: var(--spacing-md);
        transition: all var(--transition-medium);
        padding: 10px 20px;
        display: flex;
      }
      .chat-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px #0003;
      }
      .chat-btn:active {
        transform: translateY(0);
      }
      .arrow-icon {
        border-radius: var(--radius-full);
        width: 24px;
        height: 24px;
        font-size: var(--font-size-base);
        font-weight: var(--font-weight-semibold);
        background-color: #ededed;
        justify-content: center;
        align-items: center;
        display: inline-flex;
      }
      .mobile-menu-btn {
        cursor: pointer;
        z-index: calc(var(--z-mobile-nav) + 10);
        margin-left: var(--spacing-md);
        background: 0 0;
        border: none;
        flex-direction: column;
        flex-shrink: 0;
        gap: 5px;
        display: none;
      }
      .mobile-menu-btn span {
        background-color: var(--color-text-light);
        width: 25px;
        height: 2px;
        transition: var(--transition-medium);
        display: block;
      }
      .header.is-scrolled .mobile-menu-btn span,
      .header.is-inner .mobile-menu-btn span {
        background-color: var(--color-text-dark);
      }
      .header.is-scrolled .chat-btn,
      .header.is-inner .chat-btn {
        background-color: var(--color-text-dark);
        color: var(--color-text-light);
      }
      .header.is-scrolled .chat-btn .arrow-icon,
      .header.is-inner .chat-btn .arrow-icon {
        background-color: var(--color-text-light);
        color: var(--color-text-dark);
      }
      .mobile-nav {
        opacity: 0;
        pointer-events: none;
        width: auto;
        transition:
          transform var(--transition-medium),
          opacity var(--transition-medium);
        z-index: 55;
        border-radius: var(--radius-lg);
        background-color: #000000f5;
        border: 1px solid #ffffff1f;
        flex-direction: column;
        gap: 6px;
        padding: 14px;
        display: flex;
        position: fixed;
        top: 72px;
        left: 12px;
        right: 12px;
        transform: translateY(-12px);
        box-shadow: 0 28px 70px #0000008c;
      }
      .mobile-nav.active {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }
      body.nav-drawer-open .header {
        z-index: calc(var(--z-mobile-nav) + 20);
      }
      .mobile-nav a {
        color: var(--color-text-light);
        font-size: var(--font-size-base);
        opacity: 0.92;
        border-radius: var(--radius-md);
        transition:
          opacity var(--transition-base),
          background var(--transition-base);
        padding: 10px 12px;
        text-decoration: none;
      }
      .mobile-nav .nav-button {
        color: var(--color-text-light);
        text-align: left;
        font-size: var(--font-size-base);
        opacity: 0.92;
        border-radius: var(--radius-md);
        background: 0 0;
        padding: 10px 12px;
      }
      .mobile-nav a:hover,
      .mobile-nav a:active {
        opacity: 1;
        background: #ffffff14;
      }
      body.darktheme .header.is-scrolled,
      body.darktheme .header.is-inner {
        color: var(--color-text-light);
        background-color: #0f0f0ff0;
        border-bottom: 1px solid #ffffff14;
        box-shadow: 0 10px 28px #00000073;
      }
      body.darktheme .header.is-scrolled .mobile-menu-btn span,
      body.darktheme .header.is-inner .mobile-menu-btn span {
        background-color: var(--color-text-light);
      }
      body.darktheme .header.is-scrolled .chat-btn,
      body.darktheme .header.is-inner .chat-btn {
        color: var(--color-text-light);
        background-color: #ffffff1f;
      }
      body.darktheme .header.is-scrolled .chat-btn .arrow-icon,
      body.darktheme .header.is-inner .chat-btn .arrow-icon {
        color: var(--color-text-light);
        background-color: #ffffff2e;
      }
      body.darktheme .header:not(.is-scrolled):not(.is-inner) .chat-btn {
        color: var(--color-text-light);
        background-color: #ffffff1f;
      }
      body.darktheme
        .header:not(.is-scrolled):not(.is-inner)
        .chat-btn
        .arrow-icon {
        color: var(--color-text-light);
        background-color: #ffffff2e;
      }
      @media (width<=1100px) {
        .header-right {
          gap: var(--spacing-md);
        }
        .desktop-nav {
          gap: var(--spacing-lg);
        }
      }
      @media (width<=900px) {
        .header {
          padding: 14px 16px;
        }
        .desktop-nav {
          display: none;
        }
        .mobile-menu-btn {
          display: flex;
        }
        .header-right {
          gap: var(--spacing-sm);
        }
        .nav-actions {
          gap: var(--spacing-xs);
        }
        .nav-link {
          font-size: var(--font-size-sm);
          padding: 6px 8px;
        }
        .chat-btn {
          font-size: var(--font-size-sm);
          padding: 8px 12px;
        }
        .arrow-icon {
          width: 20px;
          height: 20px;
          font-size: var(--font-size-sm);
        }
        .mobile-nav {
          top: 64px;
          left: 12px;
          right: 12px;
        }
      }
      .thesis {
        background: var(--color-bg-light);
        color: var(--color-text-dark);
        padding: var(--spacing-padding-responsive) 0;
      }
      .thesis-inner {
        width: min(var(--size-container), calc(100% - 48px));
        grid-template-columns: 1.1fr 0.9fr;
        align-items: center;
        gap: clamp(24px, 4vw, 56px);
        margin: 0 auto;
        display: grid;
      }
      .thesis-text h2 {
        font-family: var(--font-primary);
        font-size: var(--font-size-heading-responsive);
        font-weight: var(--font-weight-medium);
        letter-spacing: -0.5px;
        margin-bottom: var(--spacing-md);
        color: var(--color-text-dark);
      }
      .thesis-text p {
        opacity: 0.7;
        line-height: var(--line-height-relaxed);
        font-size: var(--font-size-lg);
        max-width: 58ch;
        color: var(--color-text-muted);
      }
      .thesis-media img {
        aspect-ratio: 4/5;
        object-fit: cover;
        width: 100%;
        display: block;
      }
      .learn-more-btn {
        margin-top: var(--spacing-xl);
        color: var(--color-text-dark);
        font-size: var(--font-size-base);
        font-weight: var(--font-weight-medium);
        letter-spacing: var(--letter-spacing-base);
        cursor: pointer;
        transition: all var(--transition-medium);
        -webkit-tap-highlight-color: transparent;
        background: #fff;
        border: 1px solid #0003;
        padding: 12px 24px;
        text-decoration: none;
        display: inline-block;
      }
      .learn-more-btn:hover {
        border-color: #00000059;
        transform: translateY(-1px);
        box-shadow: 0 6px 16px #00000014;
      }
      .learn-more-btn:active {
        transform: translateY(0);
      }
      .learn-more-btn:focus-visible {
        outline: 2px solid var(--color-text-dark);
        outline-offset: 2px;
      }
      .browse-types {
        background: var(--color-bg-light);
        color: var(--color-text-dark);
        padding: var(--spacing-padding-responsive) 0;
        position: relative;
        overflow: visible;
      }
      .browse-types:before {
        content: "";
        opacity: 0.14;
        pointer-events: none;
        z-index: 0;
        background-image: url(./assets/images/back-effect.jpg);
        background-position: 50%;
        background-repeat: no-repeat;
        background-size: 100% 100%;
        width: 100vw;
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        transform: translate(-50%);
      }
      .browse-inner {
        width: min(var(--size-container), calc(100% - 48px));
        z-index: 1;
        margin: 0 auto;
        position: relative;
      }
      .browse-header {
        gap: var(--spacing-md);
        flex-direction: column;
        margin-bottom: clamp(18px, 3vw, 28px);
        display: flex;
      }
      .browse-header h2 {
        font-size: var(--font-size-heading-responsive);
        font-weight: var(--font-weight-medium);
        letter-spacing: -0.5px;
        color: var(--color-text-dark);
      }
      .browse-header p {
        color: var(--color-text-muted);
        opacity: 0.7;
        line-height: var(--line-height-normal);
        max-width: 65ch;
      }
      .type-grid {
        gap: var(--spacing-lg);
        grid-template-columns: repeat(4, 1fr);
        display: grid;
      }
      .type-card {
        gap: var(--spacing-md);
        padding: var(--spacing-md);
        color: inherit;
        cursor: pointer;
