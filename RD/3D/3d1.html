<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLB Preview</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: #f4f5f7;
      font-family: sans-serif;
    }

    .wrap {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }

    model-viewer {
      width: min(100%, 1000px);
      height: min(80vh, 700px);
      background: #e8ecf1;
      border-radius: 10px;
    }

    #status {
      margin-top: 10px;
      color: #b3261e;
      font-size: 14px;
    }
  </style>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>
  <div class="wrap">
    <model-viewer id="viewer" src="./source/ferrari_laferrari.glb" camera-controls auto-rotate environment-image="neutral"
      shadow-intensity="1" exposure="1" ar>
    </model-viewer>
    <div id="status"></div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const status = document.getElementById('status');

    viewer.addEventListener('error', () => {
      status.textContent = 'Failed to load scene.glb. Open this page through a local server (http://localhost), not file://.';
    });
  </script>
</body>

</html>
