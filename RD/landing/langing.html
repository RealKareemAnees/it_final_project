<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Gallery Landing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="mockup-frame">
        <div class="app-container">
            <header class="header">
                <div class="logo">Bergo</div>
                <nav class="desktop-nav">
                    <a href="#">Vehicles</a>
                    <a href="#">Energy</a>
                    <a href="#">Charging</a>
                    <a href="#">Discover</a>
                    <a href="#">Shop</a>
                </nav>
                <div class="header-right">
                    <button class="chat-btn">Let's Chat <span class="arrow-icon">↗</span></button>
                    <button class="mobile-menu-btn">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </header>

            <div class="mobile-nav">
                <a href="#">Vehicles</a>
                <a href="#">Energy</a>
                <a href="#">Charging</a>
                <a href="#">Discover</a>
                <a href="#">Shop</a>
            </div>

            <main class="content">
                <div class="hero-text-container">
                    <h1>Luxurious car can you<br>buy from our shop</h1>
                    <button class="shop-btn">Shop Now <span class="arrow-icon">↗</span></button>
                </div>

                <!-- Hotspots -->
                <div class="hotspot h1"></div>
                <div class="hotspot h2"></div>
                <div class="hotspot h3"></div>

                <div class="bottom-controls">
                    <button class="nav-btn prev">←</button>
                    <div class="page-counter">02<span class="muted">/08</span></div>
                    <button class="nav-btn next">→</button>
                </div>
            </main>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
