<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication - Bergo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../home/css/global.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <!-- Logo Header -->
      <a href="../home/home.html" class="auth-logo">Bergo</a>

      <div class="auth-box">
        <!-- Toggle between Login and Signup -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-target="login">Log In</button>
          <button class="auth-tab" data-target="signup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input
              type="text"
              id="login-username"
              name="username"
              placeholder="Enter your username"
              required
            />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input
              type="password"
              id="login-password"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>
          <!-- Optional: Forgot password link -->
          <div class="form-options">
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>
          <button type="submit" class="auth-submit">Log In</button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="auth-form">
          <div class="form-group">
            <label for="signup-username">Username</label>
            <input
              type="text"
              id="signup-username"
              name="username"
              placeholder="Choose a username"
              required
            />
          </div>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input
              type="email"
              id="signup-email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input
              type="password"
              id="signup-password"
              name="password"
              placeholder="Create a password"
              required
            />
          </div>
          <button type="submit" class="auth-submit">Create Account</button>
        </form>
      </div>
    </div>
    <script src="auth.js"></script>
  </body>
</html>
